<div class="toast-list">
    @for (toast of toasts(); track toast.id) {
    <div class="toast-list__toast toast-list__toast--{{ toast.kind }}">
        <span class="toast-list__message">{{ toast.message }}</span>
        <button
            type="button"
            class="toast-list__close"
            aria-label="Dismiss"
            (click)="dismiss(toast.id)"
        >
            ✕
        </button>
    </div>
    }
</div>
