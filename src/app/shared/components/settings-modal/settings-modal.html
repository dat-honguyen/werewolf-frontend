<div class="settings-modal">
    <div class="settings-modal__card">
        <header class="settings-modal__header">
            <h2>Rules & Setup</h2>
            <button type="button" class="settings-modal__close" (click)="closed.emit()">✕</button>
        </header>

        <section class="settings-modal__section">
            <h3>Role Distribution</h3>

            @for (role of allRoles; track role) {
            <div class="settings-modal__role-row">
                <span class="settings-modal__role-label">
                    <span class="settings-modal__role-icon" [style.color]="roleColor(role)"
                        >{{ roleEmoji(role) }}</span
                    >
                    <span class="settings-modal__role-name">{{ role }}</span>
                </span>
                <input
                    type="number"
                    min="0"
                    [ngModel]="draftRoleCount(role)"
                    (ngModelChange)="setDraftRoleCount(role, $event)"
                    [disabled]="readOnly()"
                />
            </div>
            } @if (!readOnly()) {
            <button
                type="button"
                class="settings-modal__button settings-modal__button--primary settings-modal__button--block"
                (click)="applyRoleDistribution()"
            >
                Apply Role Distribution
            </button>
            }
        </section>

        <section class="settings-modal__section">
            <h3>Advanced Gameplay Logic</h3>

            <label class="settings-modal__check-row">
                <input
                    type="checkbox"
                    [ngModel]="gameSettingsDraft().revealRoleOnDeath"
                    (ngModelChange)="setDraftSetting('revealRoleOnDeath', $event)"
                    [disabled]="readOnly()"
                />
                <span>Reveal role on death</span>
            </label>
            <label class="settings-modal__check-row">
                <input
                    type="checkbox"
                    [ngModel]="gameSettingsDraft().doctorCanSelfProtect"
                    (ngModelChange)="setDraftSetting('doctorCanSelfProtect', $event)"
                    [disabled]="readOnly()"
                />
                <span>Doctor can self-protect</span>
            </label>
            <label class="settings-modal__check-row">
                <input
                    type="checkbox"
                    [ngModel]="gameSettingsDraft().werewolfRequiresConsensus"
                    (ngModelChange)="setDraftSetting('werewolfRequiresConsensus', $event)"
                    [disabled]="readOnly()"
                />
                <span>Werewolves require consensus</span>
            </label>
            <label class="settings-modal__check-row">
                <input
                    type="checkbox"
                    [ngModel]="gameSettingsDraft().werewolfCanTargetWerewolf"
                    (ngModelChange)="setDraftSetting('werewolfCanTargetWerewolf', $event)"
                    [disabled]="readOnly()"
                />
                <span>Werewolves can target werewolves</span>
            </label>
            <label class="settings-modal__check-row">
                <input
                    type="checkbox"
                    [ngModel]="gameSettingsDraft().werewolfCanVoteNoKill"
                    (ngModelChange)="setDraftSetting('werewolfCanVoteNoKill', $event)"
                    [disabled]="readOnly()"
                />
                <span>Werewolves can vote no-kill (pass)</span>
            </label>
            <label class="settings-modal__check-row">
                <input
                    type="checkbox"
                    [ngModel]="gameSettingsDraft().witchSinglePotionPerNight"
                    (ngModelChange)="setDraftSetting('witchSinglePotionPerNight', $event)"
                    [disabled]="readOnly()"
                />
                <span>Witch: single potion per night</span>
            </label>
            <label class="settings-modal__check-row">
                <input
                    type="checkbox"
                    [ngModel]="gameSettingsDraft().allowForceStart"
                    (ngModelChange)="setDraftSetting('allowForceStart', $event)"
                    [disabled]="readOnly()"
                />
                <span>Allow force start</span>
            </label>

            <div class="settings-modal__number-row">
                <span>Minimum Players Required</span>
                <input
                    type="number"
                    min="1"
                    [ngModel]="gameSettingsDraft().minPlayers"
                    (ngModelChange)="setDraftSetting('minPlayers', $event)"
                    [disabled]="readOnly()"
                />
            </div>
            <div class="settings-modal__number-row">
                <span>Discussion Duration (seconds)</span>
                <input
                    type="number"
                    min="30"
                    step="30"
                    [ngModel]="gameSettingsDraft().discussionDurationSeconds"
                    (ngModelChange)="setDraftSetting('discussionDurationSeconds', $event)"
                    [disabled]="readOnly()"
                />
            </div>

            @if (!readOnly()) {
            <button
                type="button"
                class="settings-modal__button settings-modal__button--primary settings-modal__button--block"
                (click)="applyGameSettings()"
            >
                Apply Session Rules
            </button>
            }
        </section>

        <button
            type="button"
            class="settings-modal__button settings-modal__button--outline settings-modal__button--block"
            (click)="closed.emit()"
        >
            Confirm & Close
        </button>
    </div>
</div>
