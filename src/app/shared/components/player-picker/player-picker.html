<div class="player-picker">
    @for (candidate of candidates(); track candidate.playerId) {
    <button
        type="button"
        class="player-picker__option"
        [class.player-picker__option--selected]="selectedId() === candidate.playerId"
        [disabled]="candidate.excluded"
        (click)="select(candidate.playerId)"
    >
        {{ candidate.displayName }}
    </button>
    } @if (allowNoTarget()) {
    <button
        type="button"
        class="player-picker__option player-picker__option--no-target"
        [class.player-picker__option--selected]="selectedId() === null"
        (click)="select(null)"
    >
        {{ noTargetLabel() }}
    </button>
    }
</div>
