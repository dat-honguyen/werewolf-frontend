<div class="language-switch">
    <button
        type="button"
        class="language-switch__option"
        [class.language-switch__option--active]="currentLang() === 'en'"
        (click)="select('en')"
    >
        EN
    </button>
    <button
        type="button"
        class="language-switch__option"
        [class.language-switch__option--active]="currentLang() === 'vi'"
        (click)="select('vi')"
    >
        VI
    </button>
</div>
