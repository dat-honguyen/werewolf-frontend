<button
    type="button"
    class="language-switch"
    role="switch"
    [attr.aria-checked]="currentLang() === 'vi'"
    [class.language-switch--vi]="currentLang() === 'vi'"
    (click)="toggle()"
>
    <span class="language-switch__thumb"></span>
    <span class="language-switch__option">EN</span>
    <span class="language-switch__option">VI</span>
</button>
