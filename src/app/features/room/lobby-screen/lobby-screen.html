@if (lobby(); as lobby) {
<div class="lobby-screen">
    <header class="lobby-screen__header">
        <h1 class="phase-title">Room {{ roomCode }}</h1>
        <button type="button" class="lobby-screen__button" (click)="copyInviteLink()">
            Copy invite link
        </button>
    </header>

    <app-game-table>
        @for (player of lobby.players; track player.playerId) {
        <div class="lobby-screen__player">
            <app-player-card
                [displayName]="player.displayName"
                [isReady]="player.isReady"
            ></app-player-card>
            @if (isHost() && player.playerId !== myPlayerId()) {
            <button type="button" class="lobby-screen__kick" (click)="kick(player.playerId)">
                Kick
            </button>
            }
        </div>
        }
    </app-game-table>

    <button
        type="button"
        class="lobby-screen__button lobby-screen__button--primary"
        (click)="toggleReady()"
    >
        {{ myPlayer()?.isReady ? 'Un-ready' : 'Ready Up' }}
    </button>

    @if (!isHost()) {
    <button
        type="button"
        class="lobby-screen__button lobby-screen__button--danger"
        (click)="leaveLobby()"
    >
        Leave Lobby
    </button>
    } @if (isHost()) {
    <section class="lobby-screen__host-controls">
        <button type="button" class="lobby-screen__button" (click)="showSettings.set(true)">
            ⚙ Settings
        </button>
        @if (showSettings()) {
        <app-settings-modal (closed)="showSettings.set(false)"></app-settings-modal>
        }

        <button
            type="button"
            class="lobby-screen__button lobby-screen__button--primary"
            [disabled]="!canStart()"
            (click)="startGame()"
        >
            {{ needsForceStart() ? 'Force Start' : 'Start Game' }}
        </button>

        <button
            type="button"
            class="lobby-screen__button lobby-screen__button--danger"
            (click)="cancelLobby()"
        >
            Cancel Lobby
        </button>
    </section>
    }
</div>
}
