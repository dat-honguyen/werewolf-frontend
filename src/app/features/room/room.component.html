<app-toast-list></app-toast-list>

@if (canQuit()) {
    <button type="button" class="room__quit-button" (click)="quitGame()">
        {{ 'room.quitButton' | translate }}
    </button>
}

@if (showQuitConfirm()) {
    <app-confirm-dialog
        [title]="'room.quitConfirm.title' | translate"
        [message]="'room.quitConfirm.message' | translate"
        [confirmLabel]="'room.quitConfirm.confirmLabel' | translate"
        [cancelLabel]="'room.quitConfirm.cancelLabel' | translate"
        (confirmed)="confirmQuit()"
        (cancelled)="cancelQuit()"
    ></app-confirm-dialog>
}

@if (needsDisplayName()) {
    <app-join-name-prompt (confirmed)="onDisplayNameConfirmed($event)"></app-join-name-prompt>
} @else {
    <app-room-shell></app-room-shell>
}
