<div class="join-name-prompt">
    <div class="join-name-prompt__card">
        <h1 class="phase-title">{{ 'joinPrompt.title' | translate }}</h1>
        <p>{{ 'joinPrompt.instruction' | translate }}</p>
        <input
            type="text"
            class="join-name-prompt__input"
            [ngModel]="displayName()"
            (ngModelChange)="displayName.set($event)"
            (keyup.enter)="confirm()"
            [placeholder]="'joinPrompt.placeholder' | translate"
        />
        <button type="button" class="join-name-prompt__button" (click)="confirm()">
            {{ 'joinPrompt.joinButton' | translate }}
        </button>

        @if (errorMessage()) {
        <p class="join-name-prompt__error">{{ errorMessage() }}</p>
        }
    </div>
</div>
