<div class="home">
    <h1 class="phase-title home__title">Werewolf</h1>

    @if (activeRoomCode(); as roomCode) {
        <div class="home__rejoin">
            <p>
                You were still in room <strong>{{ roomCode }}</strong
                >.
            </p>
            <div class="home__rejoin-actions">
                <button
                    type="button"
                    class="home__button home__button--primary"
                    (click)="rejoinRoom()"
                >
                    Rejoin
                </button>
                <button type="button" class="home__button" (click)="dismissRejoin()">
                    Dismiss
                </button>
            </div>
        </div>
    }

    <label class="home__field">
        Display name
        <input
            type="text"
            [ngModel]="displayName()"
            (ngModelChange)="displayName.set($event)"
            placeholder="Your name"
        />
    </label>

    <div class="home__actions">
        <button type="button" class="home__button home__button--primary" (click)="createRoom()">
            Create Room
        </button>

        <div class="home__join">
            <input
                type="text"
                [ngModel]="joinRoomCode()"
                (ngModelChange)="joinRoomCode.set($event)"
                placeholder="Room code"
            />
            <button type="button" class="home__button" (click)="joinRoom()">Join Room</button>
        </div>
    </div>

    @if (errorMessage()) {
        <p class="home__error">{{ errorMessage() }}</p>
    }
</div>
