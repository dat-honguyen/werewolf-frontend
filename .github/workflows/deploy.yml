name: Deploy frontend

on:
    release:
        types: [published]
    workflow_dispatch: {}

permissions:
    contents: read

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v7
              with:
                  node-version: '22.22.3'
                  cache: 'npm'

            - run: npm ci

            - name: Write app version
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                    VERSION="${{ github.event.release.tag_name }}"
                  else
                    VERSION="dev-$(git rev-parse --short HEAD)"
                  fi
                  echo "export const APP_VERSION = '$VERSION';" > src/environments/version.ts

            - run: npm run build -- --configuration production

            - uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Sync to S3
              run: |
                  # i18n/*.json keep a stable filename across releases (unlike the hashed bundle
                  # files) but their *content* changes every time a translation key is added or
                  # edited -- an immutable year-long cache silently serves a returning browser its
                  # own stale copy even right after a release purges Cloudflare's edge cache, since
                  # that purge never reaches a client that already has the old response cached
                  # locally. Same short/must-revalidate treatment as index.html for that reason.
                  aws s3 sync dist/werewolf-frontend/browser "s3://${{ secrets.S3_BUCKET }}" \
                    --delete \
                    --cache-control "public,max-age=31536000,immutable" \
                    --exclude "index.html" \
                    --exclude "i18n/*"

                  aws s3 sync dist/werewolf-frontend/browser/i18n "s3://${{ secrets.S3_BUCKET }}/i18n" \
                    --delete \
                    --cache-control "public,max-age=300,must-revalidate"

                  aws s3 cp dist/werewolf-frontend/browser/index.html "s3://${{ secrets.S3_BUCKET }}/index.html" \
                    --cache-control "public,max-age=0,must-revalidate"

            - name: Purge Cloudflare cache
              run: |
                  curl -sS -X POST \
                    "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
                    -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                    -H "Content-Type: application/json" \
                    --data '{"purge_everything":true}' \
                    --fail-with-body
