name: Deploy frontend

on:
    release:
        types: [published]
    workflow_dispatch: {}

permissions:
    contents: read

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22.22.3'
                  cache: 'npm'

            - run: npm ci

            - run: npm run build -- --configuration production

            - uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Sync to S3
              run: |
                  aws s3 sync dist/werewolf-frontend/browser "s3://${{ secrets.S3_BUCKET }}" \
                    --delete \
                    --cache-control "public,max-age=31536000,immutable" \
                    --exclude "index.html"

                  aws s3 cp dist/werewolf-frontend/browser/index.html "s3://${{ secrets.S3_BUCKET }}/index.html" \
                    --cache-control "public,max-age=0,must-revalidate"

            - name: Purge Cloudflare cache
              run: |
                  curl -sS -X POST \
                    "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
                    -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                    -H "Content-Type: application/json" \
                    --data '{"purge_everything":true}' \
                    --fail-with-body
